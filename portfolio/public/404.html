<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Hayden Tinker</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #1a1b1e;
        color: #c1c2c5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }

      .container {
        max-width: 480px;
      }

      .code {
        font-size: clamp(5rem, 20vw, 8rem);
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(135deg, #339af0, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #e9ecef;
        margin-bottom: 0.75rem;
      }

      p {
        font-size: 1rem;
        color: #868e96;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      a {
        display: inline-block;
        padding: 0.6rem 1.5rem;
        background: linear-gradient(135deg, #339af0, #22d3ee);
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        transition: opacity 0.2s ease;
      }

      a:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>Looks like this page doesn't exist. Head back to the portfolio.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
